<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allencai's Command Center</title>
    <style>
        /* --- 1. 核心配色变量 --- */
        :root {
            --bg-dark: #0a0b12;
            --card-glass: rgba(25, 27, 38, 0.85);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-dim: #94a8c1;
            --text-light: #e6f0ff;
            --accent-cyan: #00e6ff;
            --accent-purple: #c700ff;
            --danger: #ff4d5a;
            --active-item-bg: rgba(0, 230, 255, 0.22);
            --player-controls-bg: rgba(18, 20, 32, 0.92);
            --player-controls-border: rgba(0, 230, 255, 0.4);
            --glow-intensity: 0 0 20px rgba(0, 230, 255, 0.3);
            --glow-subtle: 0 0 12px rgba(0, 230, 255, 0.15);
            --shadow-deep: 0 16px 40px rgba(0, 0, 0, 0.4);
            --shadow-medium: 0 8px 24px rgba(0, 0, 0, 0.25);
            --shadow-light: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: 
                radial-gradient(circle at 15% 25%, rgba(0, 230, 255, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(199, 0, 255, 0.08) 0%, transparent 45%),
                linear-gradient(135deg, rgba(8, 10, 18, 0.95) 0%, rgba(6, 6, 12, 0.98) 100%),
                url('/static/bg.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-purple)); 
            border-radius: 4px; 
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: linear-gradient(to bottom, #00ccff, #b000e6); 
        }

        .container {
            width: 94%; max-width: 1520px;
            display: grid; 
            grid-template-columns: 2.8fr 1.5fr; 
            gap: 2.4rem; 
            padding: 2.4rem 0;
            height: 92vh;
            transition: grid-template-columns 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 当 body 有此类时放大笔记本栏目 */
        body.notebook-expanded .container {
            grid-template-columns: 1.2fr 3fr;
        }

        /* 音乐播放器面板样式 */
        .music-player {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 420px;
            background: var(--player-controls-bg);
            border: 1px solid var(--player-controls-border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: var(--shadow-deep), var(--glow-intensity);
            max-height: 420px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .music-player.minimized {
            max-height: 85px;
        }

        .music-player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .playback-mode {
            display: flex;
            gap: 0.8rem;
        }

        .playback-mode-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(0, 230, 255, 0.15);
            border: 1px solid var(--accent-cyan);
            border-radius: 24px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .playback-mode-btn.active {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: var(--glow-intensity);
            transform: translateY(-2px);
        }

        .current-playlist {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-cyan);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 10px rgba(0, 230, 255, 0.4);
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .player-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: var(--text-main);
            font-size: 1.4rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .player-btn:hover {
            background: rgba(0, 230, 255, 0.3);
            transform: scale(1.15) translateY(-2px);
            box-shadow: var(--glow-intensity);
        }

        .player-btn.play-pause {
            background: var(--accent-cyan);
            color: #000;
            font-size: 1.6rem;
            box-shadow: var(--glow-intensity);
        }

        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar {
            flex-grow: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0.25;
            animation: pulse 2s infinite;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        .progress::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            background: white;
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .current-song-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 180px;
        }

        .current-song-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-light);
        }

        .current-song-artist {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* 播放列表选择器 */
        .playlist-selector {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            max-height: 45px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: thin;
        }

        /* 笔记分类栏（水平） - 保持单行横向滚动，调高高度与按钮内边距 */
        #categoryList {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            /* 保持单行，避免换行导致纵向滚动 */
            flex-wrap: nowrap;
            /* 设定固定高度为原来的三倍（40px -> 120px） */
            height: 80px;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 10px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }

        #categoryList .playlist-btn {
            /* 垂直内边距增大以适配更高的容器，并垂直居中 */
            display: inline-flex;
            align-items: center;
            padding: 1.1rem 0.8rem;
            font-size: 1rem;
            white-space: nowrap;
        }

        .playlist-btn {
            padding: 0.4rem 0.8rem;
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            font-weight: 600;
        }

        .playlist-btn:hover, .playlist-btn.active {
            background: rgba(0, 230, 255, 0.3);
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
            box-shadow: var(--glow-intensity);
        }

        /* 歌曲列表样式 */
        .songs-list {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 1rem;
            background: var(--card-glass);
            border-radius: 12px;
            padding: 0.6rem;
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
        }

        .song-item {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }

        .song-item:hover {
            background: rgba(0, 230, 255, 0.2);
            transform: translateX(6px);
        }

        .song-item.playing {
            background: rgba(0, 230, 255, 0.3);
            border-left: 4px solid var(--accent-cyan);
            box-shadow: var(--glow-intensity);
            transform: translateX(4px);
        }

        .song-title {
            font-weight: 600;
            color: var(--text-light);
        }

        .song-duration {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* 音乐播放器最小化/最大化按钮 */
        .window-control-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: 0.6rem;
            backdrop-filter: blur(8px);
        }

        .window-control-btn:hover {
            background: rgba(0, 230, 255, 0.3);
            transform: scale(1.15) rotate(3deg);
            box-shadow: var(--glow-intensity);
        }

        /* 更明显的笔记本放大切换按钮样式 */
        .notebook-toggle-btn {
            background: var(--accent-cyan);
            color: #000;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,230,255,0.3), var(--glow-intensity);
            margin-left: 0.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .notebook-toggle-btn:hover { 
            transform: scale(1.15) rotate(8deg);
            box-shadow: 0 10px 24px rgba(0,230,255,0.4), var(--glow-intensity);
        }

        /* 音乐播放器图标 - 始终显示在底部 */
        .music-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0, 230, 255, 0.5), var(--glow-intensity);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: float 3s ease-in-out infinite;
        }

        .music-icon:hover {
            transform: scale(1.2) rotate(15deg);
            box-shadow: 0 12px 32px rgba(0, 230, 255, 0.6), var(--glow-intensity);
        }

        .music-icon i {
            color: #000;
            font-size: 1.6rem;
        }

        /* 调整大小手柄 */
        .resize-handle {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background: var(--accent-cyan);
            border-radius: 4px;
            z-index: 1001;
            box-shadow: var(--glow-intensity);
        }

        /* 左侧面板：导航区 */
                  .left-panel {
              display: flex; flex-direction: column; gap: 2rem;
              overflow-y: auto; padding-right: 10px;
          }
  
        /* 搜索框样式 */
        .search-section {
            margin-bottom: 1.5rem;
        }
        
        .search-container {
            position: relative;
            width: 100%;
        }
        
        .tech-search-input {
            width: 100%;
            padding: 16px 60px 16px 24px;
            background: rgba(15, 17, 26, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
            box-shadow: var(--shadow-light);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        
        .tech-search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 230, 255, 0.25), var(--glow-intensity);
            background: rgba(20, 22, 35, 0.9);
        }
        
        .tech-search-input::placeholder {
            color: var(--text-dim);
            opacity: 0.8;
        }
        
        .search-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 230, 255, 0.15);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-size: 1.2rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }
        
        .search-btn:hover {
            background: var(--accent-cyan);
            color: #000;
            transform: translateY(-50%) scale(1.15);
            box-shadow: var(--glow-intensity);
        }
        
        .search-btn:active {
            transform: translateY(-50%) scale(1.05);
        }
        
        .search-btn i {
            font-size: 1.3rem;
        }
        
        /* 搜索框动画效果 */
        @keyframes search-pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(0, 230, 255, 0.7); 
            }
            70% { 
                box-shadow: 0 0 0 10px rgba(0, 230, 255, 0); 
            }
        }
        
        .tech-search-input:focus + .search-btn {
            animation: search-pulse 2s infinite;
        }
        
        /* 搜索建议框 */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-top: 10px;
            box-shadow: var(--shadow-medium), var(--glow-subtle);
            z-index: 1000;
            display: none;
            overflow: hidden;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .search-history-header {
            padding: 12px 24px;
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-history-clear {
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .search-history-clear:hover {
            color: var(--danger);
            background: rgba(255, 77, 90, 0.15);
        }
        
        .search-suggestion-item {
            padding: 14px 24px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .search-suggestion-item:last-child {
            border-bottom: none;
        }
        
        .search-suggestion-item:hover {
            background: rgba(0, 230, 255, 0.2);
            color: var(--accent-cyan);
            transform: translateX(5px);
        }
        
        .search-suggestion-item .suggestion-text {
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .search-suggestion-item .suggestion-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.7;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .search-suggestion-item .suggestion-delete {
            font-size: 1rem;
            color: var(--text-dim);
            opacity: 0.5;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .search-suggestion-item:hover .suggestion-delete {
            color: var(--danger);
            opacity: 1;
            background: rgba(255, 77, 90, 0.15);
        }
        
        .search-suggestion-item:hover .suggestion-hint {
            color: var(--accent-cyan);
            opacity: 1;
        }
        
        .search-empty-state {
            padding: 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        
        .search-empty-state i {
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .tech-search-input {
                padding: 14px 55px 14px 20px;
                font-size: 1.05rem;
            }
            
            .search-btn {
                width: 38px;
                height: 38px;
                right: 12px;
            }
        }
        
        @media (max-width: 768px) {
            .search-section {
                margin-bottom: 1rem;
            }
            
            .tech-search-input {
                padding: 12px 50px 12px 18px;
                font-size: 1rem;
                border-radius: 16px;
            }
            
            .search-btn {
                width: 36px;
                height: 36px;
                right: 10px;
                font-size: 1.1rem;
            }
            
            .search-suggestions {
                border-radius: 12px;
            }
            
            .search-suggestion-item {
                padding: 12px 18px;
            }
        }

        .header-section {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 2rem 2.4rem;
            background: var(--card-glass); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            border-radius: 24px;
            box-shadow: var(--shadow-medium);
        }
        .time-box h1 { 
            font-size: 4.2rem; 
            margin: 0; 
            line-height: 1; 
            font-weight: 800; 
            letter-spacing: -2.5px; 
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 230, 255, 0.4);
        }
        .time-box p { 
            font-size: 1.3rem; 
            color: var(--text-dim); 
            margin: 10px 0 0 0; 
            font-weight: 500;
        }
        .greeting { 
            font-size: 1.4rem; 
            color: var(--accent-cyan); 
            font-weight: 700; 
            text-shadow: 0 0 15px rgba(0, 230, 255, 0.5);
        }

        .section-title {
            font-size: 1rem; 
            color: var(--text-dim); 
            margin-bottom: 1rem;
            display: flex; 
            align-items: center; 
            gap: 0.8rem;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 800;
        }
        .section-title::after {
            content: ''; 
            flex-grow: 1; 
            height: 2px; 
            background: linear-gradient(to right, var(--accent-cyan), transparent);
        }

        .nav-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1.4rem; 
            margin-bottom: 1.4rem; 
            min-height: 120px; 
            padding: 10px;
        }

        .nav-item {
            background: var(--card-glass); 
            border: 1px solid var(--card-border);
            border-radius: 20px; 
            padding: 1.6rem;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            user-select: none;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-light);
        }
        .nav-item:hover {
            border-color: var(--accent-cyan); 
            transform: translateY(-8px) scale(1.05);
            box-shadow: var(--shadow-medium), var(--glow-intensity);
        }
        .nav-item.dragging { 
            opacity: 0.4; 
            border: 1px dashed var(--accent-cyan); 
            transform: none !important;
        }
        .nav-icon { 
            font-size: 2.4rem; 
            margin-bottom: 0.8rem; 
            text-shadow: 0 0 12px rgba(0, 230, 255, 0.4);
        }
        .nav-item:hover .nav-icon {
            transform: scale(1.2) rotate(5deg);
        }
        .nav-title { 
            font-size: 1rem; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 100%;
            font-weight: 600;
        }

        .add-btn {
            border: 2px dashed var(--card-border); 
            color: var(--text-dim);
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 20px; 
            cursor: pointer; 
            flex-direction: column; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(25, 27, 38, 0.4);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .add-btn:hover { 
            border-color: var(--accent-cyan); 
            color: var(--accent-cyan); 
            background: rgba(0,230,255,0.12); 
            transform: scale(1.08) translateY(-4px);

        /* 右侧面板：笔记本系统 (升级核心) */

    </style>
</head>
<body>

<div class="container">
    <!-- 左侧面板 -->
    <div class="left-panel">
        <!-- 顶部搜索栏 -->
        <div class="search-section">
            <div class="search-container">
                <input type="text" 
                       class="tech-search-input" 
                       id="googleSearchInput" 
                       placeholder="输入搜索内容，按Enter或点击搜索..." 
                       autocomplete="off">
                <button class="search-btn" id="searchBtn" title="搜索">

            </div>

                <button id="toggleNotebookBtn" class="window-control-btn notebook-toggle-btn" onclick="toggleNotebookSize()" title="放大/还原笔记本" aria-label="放大笔记本">🔍</button>
            </div>

            <div class="section-title">🌐 常用网站</div>
            <div class="nav-grid sortable-grid" id="webGrid"></div>
            <div class="add-btn" onclick="openModal('websites')"><span>➕ 添加网站</span></div>
        </div>

        <div>
            <div class="section-title">💻 应用程序</div>
            <div class="nav-grid sortable-grid" id="appGrid"></div>
            <div class="add-btn" onclick="openModal('software')"><span>➕ 添加软件</span></div>
        </div>
    </div>

    <!-- 右侧面板：笔记本 -->

            <!-- 笔记列表 -->

                    <span>我的笔记本</span>
                    <button class="new-note-btn" onclick="createNewNote()" title="新建笔记">➕</button>
                </div>
                <div style="padding:0.4rem; border-bottom:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; gap:8px;">

                    <button class="new-note-btn" onclick="createNewCategory()" title="新建分类">📁➕</button>

                <button class="playback-mode-btn active" data-mode="list" onclick="setPlaybackMode('list')">列表</button>
                <button class="playback-mode-btn" data-mode="repeat" onclick="setPlaybackMode('repeat')">单曲</button>

<!-- 添加导航的弹窗 -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3 id="modalTitle">添加新项</h3>
        <input type="hidden" id="addType">

            <label>名称</label><input type="text" id="linkTitle">
        </div>

        </div>

            <label>图标</label><input type="text" id="linkIcon" placeholder="❤️">
        </div>

            <button class="btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn btn-confirm" onclick="confirmAdd()">确定</button>
        </div>

</div>

<script>
    // --- 音乐播放器相关变量 ---
    let audioPlayer = new Audio();
    let currentPlaylist = [];
    let currentSongIndex = -1;
    let playbackMode = 'list'; // 'list', 'repeat', 'shuffle'
    let playlists = [];
    let shuffledOrder = [];
    let shuffleIndex = 0;
    let isPlayerVisible = false;
    let isPlayerMinimized = false;
    let isResizing = false;
    let originalWidth = 400;
    let originalHeight = 400;
    
    // --- 数据结构 ---
    let globalData = {
        websites: [],
        software: [],
        notes: [], // 兼容旧结构，仍保留平铺 notes
        note_categories: [] // 新增：分类结构 [{id, name, notes: [...]}]
    };
    let currentCategoryId = null; // 当前选中的分类（null 表示未选择，使用平铺 notes）
    
    let currentNoteId = null; // 当前正在编辑哪个笔记
    let userRole = 'user'; // 默认为普通用户

    // --- 1. 基础功能 (时间) ---
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        document.getElementById('date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        const h = now.getHours();
        document.getElementById('greetingText').innerText = `Allencai，${h<11?"上午好":h<13?"中午好":h<18?"下午好":"晚上好"}`;
    }
    setInterval(updateTime, 1000); updateTime();

    // --- 2. 数据加载与迁移 ---
    async function loadData() {
        try {
            const res = await fetch('/api/get_data');
            const serverData = await res.json();

            // 数据迁移：如果只有旧版 memo (字符串)，转换成新版 notes (数组)
            if (serverData.memo && (!serverData.notes || serverData.notes.length === 0)) {
                globalData.notes = [{
                    id: Date.now(),
                    title: '默认笔记',
                    content: serverData.memo,
                    updated: new Date().toLocaleString()
                }];
                // 迁移其他数据
                globalData.websites = serverData.websites || serverData.links || [];
                globalData.software = serverData.software || [];
            } else {
                globalData = serverData;
                // 确保各项都不为空
                if(!globalData.notes) globalData.notes = [];
                if(!globalData.websites) globalData.websites = [];
                if(!globalData.software) globalData.software = [];
            }

            // 初始化界面
            renderAllNav();

            // 数据迁移：如果存在旧版平铺 notes，但没有分类，则创建一个默认分类并迁移
            if ((!globalData.note_categories || globalData.note_categories.length === 0) && globalData.notes && globalData.notes.length > 0) {
                const defaultCat = {
                    id: Date.now(),
                    name: '默认',
                    notes: globalData.notes.slice()
                };
                globalData.note_categories = [defaultCat];
                currentCategoryId = defaultCat.id;
            }

            // 确保结构存在
            if(!globalData.note_categories) globalData.note_categories = [];
            if(!globalData.notes) globalData.notes = [];

            renderCategoryList();
            // 如果有分类则选中第一个分类并渲染其笔记
            if (globalData.note_categories.length > 0) {
                if (!currentCategoryId) currentCategoryId = globalData.note_categories[0].id;
                renderNoteList();
                const firstCat = globalData.note_categories.find(c => c.id === currentCategoryId);
                if (firstCat && firstCat.notes && firstCat.notes.length>0) {
                    switchNote(firstCat.notes[0].id);
                } else {
                    createNewNote(false);
                }
            } else {
                // 兼容：没有分类时按平铺 notes 处理
                if (globalData.notes.length === 0) {
                    createNewNote(false);
                } else {
                    switchNote(globalData.notes[0].id);
                }
                renderNoteList();
            }

            // 检查用户权限并设置界面
            checkUserPermissions();

        } catch(e) { console.error("加载失败", e); }
    }

    // --- 音乐播放器初始化 ---
    async function initMusicPlayer() {
        try {
            const response = await fetch('/api/get_music_playlists');
            playlists = await response.json();
            
            // 渲染播放列表选择器
            renderPlaylistSelector();
            
            // 始终显示音乐图标
            document.getElementById('musicIcon').style.display = 'flex';
            
            if (playlists.length > 0) {
                // 默认不自动显示播放器，只显示图标
                console.log("音乐播放器已初始化，点击右下角🎵图标打开");
            } else {
                console.log("没有找到音乐播放列表");
            }
        } catch (error) {
            console.error("加载音乐播放列表失败:", error);
        }
    }
    
    // --- 检查用户权限 ---
    async function checkUserPermissions() {
        try {
            // 获取当前用户信息
            const response = await fetch('/api/get_user_info');
            if (response.ok) {
                const userInfo = await response.json();
                userRole = userInfo.role || 'user';
                
                // 根据角色设置界面权限
                setInterfacePermissions();
            } else {
                // 如果无法获取用户信息，假设为普通用户
                userRole = 'user';
                setInterfacePermissions();
            }
        } catch (error) {
            console.error('获取用户信息失败:', error);
            userRole = 'user';
            setInterfacePermissions();
        }
    }

    // --- 设置界面权限 ---
    function setInterfacePermissions() {
        if (userRole === 'admin') {
            // 管理员拥有全部权限
            enableAllFeatures();
            document.getElementById('permissionWarning').style.display = 'none';
        } else {
            // 普通用户只有查看权限
            disableEditingFeatures();
            document.getElementById('permissionWarning').style.display = 'block';
        }
    }

    // --- 启用所有功能（管理员）---
    function enableAllFeatures() {
        // 启用添加按钮
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
        
        // 启用编辑区域
        document.getElementById('noteTitleInput').readOnly = false;
        const contentEl = document.getElementById('noteContentInput');
        if (contentEl) contentEl.contentEditable = 'true';
        document.querySelector('.new-note-btn').style.pointerEvents = 'auto';
        
        // 启用删除按钮（通过CSS控制）
        const style = document.createElement('style');
        style.innerHTML = `
            .nav-item:hover .delete-btn { display: flex !important; }
            .note-list-item:hover .del-note-btn { opacity: 1 !important; }
        `;
        document.head.appendChild(style);
        // 重新渲染导航以启用删除按钮和可拖拽属性
        renderAllNav();
    }

    // --- 禁用编辑功能（普通用户）---
    function disableEditingFeatures() {
        // 禁用添加按钮
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
        });
        
        // 禁用编辑区域
        document.getElementById('noteTitleInput').readOnly = true;
        const contentEl = document.getElementById('noteContentInput');
        if (contentEl) contentEl.contentEditable = 'false';
        document.querySelector('.new-note-btn').style.pointerEvents = 'none';
        
        // 隐藏删除按钮
        const style = document.createElement('style');
        style.innerHTML = `
            .delete-btn, .del-note-btn {
                display: none !important;
            }
            .add-btn {
                cursor: not-allowed !important;
            }
            .note-title-input, .note-content-area {
                background: rgba(255,255,255,0.02) !important;
                cursor: not-allowed !important;
            }
        `;
        document.head.appendChild(style);
        // 重新渲染导航以禁用删除和拖拽
        renderAllNav();
    }

    function renderPlaylistSelector() {
        const container = document.getElementById('playlistSelector');
        container.innerHTML = '';
        
        playlists.forEach(playlist => {
            const button = document.createElement('button');
            button.className = 'playlist-btn';
            button.textContent = playlist.name;
            button.onclick = () => loadPlaylist(playlist.name);
            container.appendChild(button);
        });
    }

    function loadPlaylist(playlistName) {
        const playlist = playlists.find(p => p.name === playlistName);
        if (!playlist) return;
        
        currentPlaylist = playlist.songs;
        document.getElementById('currentPlaylist').textContent = playlistName;
        currentSongIndex = -1;
        renderSongsList();
        
        // 更新按钮激活状态
        document.querySelectorAll('.playlist-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === playlistName);
        });
    }

    function renderSongsList() {
        const container = document.getElementById('songsList');
        container.innerHTML = '';
        
        currentPlaylist.forEach((song, index) => {
            const songElement = document.createElement('div');
            songElement.className = `song-item ${index === currentSongIndex ? 'playing' : ''}`;
            songElement.onclick = () => playSong(index);
            songElement.innerHTML = `
                <div class="song-title">${song.title}</div>
                <div class="song-duration">--:--</div>
            `;
            container.appendChild(songElement);
        });
    }

    function playSong(index) {
        if (index < 0 || index >= currentPlaylist.length) return;
        
        currentSongIndex = index;
        const song = currentPlaylist[index];
        // 使用新的相对路径格式
        const songUrl = `/music/${encodeURIComponent(song.relative_path)}`;
        
        // 设置音频源并播放
        audioPlayer.src = songUrl;
        audioPlayer.load(); // 确保重新加载音频
        audioPlayer.play().then(() => {
            document.getElementById('playPauseBtn').innerHTML = '⏸'; // 暂停图标
        }).catch(e => console.error("播放失败:", e));
        
        // 更新UI
        updatePlayerUI();
        renderSongsList();
    }

    function togglePlayPause() {
        if (audioPlayer.paused) {
            audioPlayer.play().then(() => {
                document.getElementById('playPauseBtn').innerHTML = '⏸'; // 暂停图标
            }).catch(e => console.error("播放失败:", e));
        } else {
            audioPlayer.pause();
            document.getElementById('playPauseBtn').innerHTML = '▶'; // 播放图标
        }
    }

    function nextSong() {
        if (currentPlaylist.length === 0) return;
        
        if (playbackMode === 'repeat') {
            // 单曲循环，重新播放当前歌曲
            playSong(currentSongIndex);
        } else if (playbackMode === 'shuffle') {
            // 随机播放模式
            if (shuffledOrder.length === 0) {
                generateShuffledOrder();
            }
            shuffleIndex = (shuffleIndex + 1) % shuffledOrder.length;
            playSong(shuffledOrder[shuffleIndex]);
        } else {
            // 列表顺序播放
            const nextIndex = (currentSongIndex + 1) % currentPlaylist.length;
            playSong(nextIndex);
        }
    }

    function prevSong() {
        if (currentPlaylist.length === 0) return;
        
        if (playbackMode === 'repeat') {
            // 单曲循环，重新播放当前歌曲
            playSong(currentSongIndex);
        } else if (playbackMode === 'shuffle') {
            // 随机播放模式
            if (shuffledOrder.length === 0) {
                generateShuffledOrder();
            }
            shuffleIndex = shuffleIndex === 0 ? shuffledOrder.length - 1 : shuffleIndex - 1;
            playSong(shuffledOrder[shuffleIndex]);
        } else {
            // 列表顺序播放
            const prevIndex = currentSongIndex === 0 ? currentPlaylist.length - 1 : currentSongIndex - 1;
            playSong(prevIndex);
        }
    }

    function generateShuffledOrder() {
        // 生成随机播放顺序
        shuffledOrder = Array.from(Array(currentPlaylist.length).keys());
        for (let i = shuffledOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOrder[i], shuffledOrder[j]] = [shuffledOrder[j], shuffledOrder[i]];
        }
        shuffleIndex = 0;
    }

    function setPlaybackMode(mode) {
        playbackMode = mode;
        document.querySelectorAll('.playback-mode-btn').forEach(btn => {
            if(btn.dataset.mode) {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            }
        });
    }

    function toggleMinimizePlayer() {
        const player = document.getElementById('musicPlayer');
        isPlayerMinimized = !isPlayerMinimized;
        
        if (isPlayerMinimized) {
            player.classList.add('minimized');
            document.querySelector('.window-control-btn').innerHTML = '+'; // 展开图标
        } else {
            player.classList.remove('minimized');
            document.querySelector('.window-control-btn').innerHTML = '−'; // 最小化图标
        }
    }

    function showMusicPlayer() {
        document.getElementById('musicPlayer').style.display = 'flex';
        isPlayerVisible = true;
        
        // 如果是第一次显示，加载播放列表
        if (playlists.length === 0) {
            initMusicPlayer();
        }
        
        // 如果有播放列表，加载第一个
        if (playlists.length > 0 && currentPlaylist.length === 0) {
            loadPlaylist(playlists[0].name);
        }
    }

    function hideMusicPlayer() {
        document.getElementById('musicPlayer').style.display = 'none';
        isPlayerVisible = false;
    }

    function seekSong(event) {
        const progressBar = document.querySelector('.progress-bar');
        const rect = progressBar.getBoundingClientRect();
        const pos = (event.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = pos * audioPlayer.duration;
    }

    function updatePlayerUI() {
        if (currentSongIndex >= 0 && currentSongIndex < currentPlaylist.length) {
            const song = currentPlaylist[currentSongIndex];
            document.getElementById('currentSongTitle').textContent = song.title;
            document.getElementById('currentSongArtist').textContent = document.getElementById('currentPlaylist').textContent;
        }
    }

    // 音频事件监听
    audioPlayer.addEventListener('loadedmetadata', function() {
        document.getElementById('totalTime').textContent = formatTime(audioPlayer.duration);
    });

    audioPlayer.addEventListener('timeupdate', function() {
        document.getElementById('currentTime').textContent = formatTime(audioPlayer.currentTime);
        const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';
    });

    audioPlayer.addEventListener('ended', function() {
        nextSong();
    });

    audioPlayer.addEventListener('play', function() {
        document.getElementById('playPauseBtn').innerHTML = '⏸';
    });

    audioPlayer.addEventListener('pause', function() {
        document.getElementById('playPauseBtn').innerHTML = '▶';
    });

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    // 调整大小功能
    function initResize() {
        const resizeHandle = document.getElementById('resizeHandle');
        const player = document.getElementById('musicPlayer');
        
        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            e.preventDefault();
            originalWidth = player.offsetWidth;
            originalHeight = player.offsetHeight;
            document.addEventListener('mousemove', resizePlayer);
            document.addEventListener('mouseup', stopResize);
        });
    }

    function resizePlayer(e) {
        if (!isResizing) return;
        
        const player = document.getElementById('musicPlayer');
        const deltaX = e.movementX;
        const deltaY = e.movementY;
        
        let newWidth = originalWidth - deltaX;
        let newHeight = originalHeight - deltaY;
        
        // 限制最小尺寸
        newWidth = Math.max(300, newWidth);
        newHeight = Math.max(200, newHeight);
        
        player.style.width = newWidth + 'px';
        player.style.height = newHeight + 'px';
    }

    function stopResize() {
        isResizing = false;
        document.removeEventListener('mousemove', resizePlayer);
        document.removeEventListener('mouseup', stopResize);
    }

    // --- 3. 笔记本逻辑 (核心升级) ---

    // 渲染左侧笔记列表
    function renderNoteList() {
        const listEl = document.getElementById('noteList');
        listEl.innerHTML = '';

        // 根据当前分类选择要展示的笔记集合
        let notesToShow = [];
        if (currentCategoryId) {
            const cat = globalData.note_categories.find(c => c.id === currentCategoryId);
            if (cat && cat.notes) notesToShow = cat.notes.slice();
        } else {
            notesToShow = globalData.notes.slice();
        }

        // 按时间倒序排列（最近修改的在上面）
        const sortedNotes = notesToShow.sort((a, b) => new Date(b.updated) - new Date(a.updated));

        sortedNotes.forEach(note => {
            const item = document.createElement('div');
            item.className = `note-list-item ${note.id === currentNoteId ? 'active' : ''}`;
            item.onclick = () => switchNote(note.id);

            // 简单的日期格式化
            const dateStr = note.updated ? note.updated.split(' ')[0] : '刚刚';

            item.innerHTML = `
                <div style="overflow:hidden;">
                    <div class="note-item-title">${note.title || '无标题'}</div>
                    <div class="note-item-date">${dateStr}</div>
                </div>
            `;

            // 只有管理员才能看到删除按钮
            if (userRole === 'admin') {
                const delBtn = document.createElement('div');
                delBtn.className = 'del-note-btn';
                delBtn.textContent = '🗑️';
                delBtn.onclick = (e) => deleteNote(e, note.id);
                item.appendChild(delBtn);
            }

            listEl.appendChild(item);
        });
    }

    // 渲染分类列表（水平）
    function renderCategoryList() {
        const el = document.getElementById('categoryList');
        if(!el) return;
        el.innerHTML = '';

        globalData.note_categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'playlist-btn';
            btn.textContent = cat.name;
            btn.style.whiteSpace = 'nowrap';
            btn.onclick = () => switchCategory(cat.id);
            if (cat.id === currentCategoryId) btn.classList.add('active');

            // 管理员可删除分类
            if (userRole === 'admin') {
                const del = document.createElement('span');
                del.style.marginLeft = '6px';
                del.style.cursor = 'pointer';
                del.textContent = '✕';
                del.onclick = (e) => { e.stopPropagation(); deleteCategory(cat.id); };
                btn.appendChild(del);
            }

            el.appendChild(btn);
        });
    }

    function createNewCategory() {
        if (userRole !== 'admin') { showPermissionWarning(); return; }
        const name = prompt('请输入分类名称：', '新分类');
        if (!name) return;
        const cat = { id: Date.now(), name, notes: [] };
        globalData.note_categories.push(cat);
        currentCategoryId = cat.id;
        saveData(); renderCategoryList(); renderNoteList();
    }

    function deleteCategory(id) {
        if (userRole !== 'admin') { showPermissionWarning(); return; }
        if (!confirm('删除该分类将同时删除其中的所有笔记，确认吗？')) return;
        globalData.note_categories = globalData.note_categories.filter(c => c.id !== id);
        if (currentCategoryId === id) currentCategoryId = globalData.note_categories.length ? globalData.note_categories[0].id : null;
        saveData(); renderCategoryList(); renderNoteList();
    }

    function switchCategory(id) {
        currentCategoryId = id;
        renderCategoryList();
        renderNoteList();
        // 如果分类内有笔记则切换到第一条
        const cat = globalData.note_categories.find(c => c.id === id);
        if (cat && cat.notes && cat.notes.length>0) switchNote(cat.notes[0].id);
        else createNewNote(false);
    }

    // 切换当前笔记
    function switchNote(id) {
        currentNoteId = id;
        // 在所有分类中查找笔记（优先分类），若未找到则查找平铺 notes
        let note = null;
        for (const cat of (globalData.note_categories || [])) {
            const found = (cat.notes || []).find(n => n.id === id);
            if (found) { note = found; break; }
        }
        if (!note) note = (globalData.notes || []).find(n => n.id === id);

        if (note) {
            document.getElementById('noteTitleInput').value = note.title;
            document.getElementById('noteContentInput').innerHTML = note.content || '';
            document.getElementById('noteUpdateTime').innerText = `更新于: ${note.updated}`;
            updateCharCount(note.content);
            renderNoteList(); // 刷新选中状态
        }
    }

    // 新建笔记
    function createNewNote(autoSave = true) {
        if (userRole !== 'admin') {
            showPermissionWarning();
            return;
        }
        
        const newNote = {
            id: Date.now(),
            title: '新笔记',
            content: '',
            updated: new Date().toLocaleString()
        };
        // 如果选择了分类，则添加到当前分类；否则添加到平铺 notes
        if (currentCategoryId) {
            const cat = globalData.note_categories.find(c => c.id === currentCategoryId);
            if (!cat) {
                // 若分类不存在则新建
                const newCat = { id: Date.now()+1, name: '默认', notes: [newNote] };
                globalData.note_categories.push(newCat);
                currentCategoryId = newCat.id;
            } else {
                cat.notes.unshift(newNote);
            }
        } else {
            globalData.notes.unshift(newNote);
        }
        if (autoSave) saveData();

        switchNote(newNote.id);
        renderCategoryList(); renderNoteList();
        // 自动聚焦标题
        document.getElementById('noteTitleInput').focus();
    }

    // 删除笔记
    function deleteNote(e, id) {
        if (userRole !== 'admin') {
            showPermissionWarning();
            return;
        }
        
        e.stopPropagation(); // 阻止触发切换
        if (confirm('确定删除这条笔记吗？')) {
            // 从分类中删除（如果存在），否则从平铺 notes 删除
            let removed = false;
            for (const cat of (globalData.note_categories || [])) {
                const before = cat.notes.length;
                cat.notes = (cat.notes || []).filter(n => n.id !== id);
                if (cat.notes.length !== before) removed = true;
            }
            if (!removed) {
                globalData.notes = (globalData.notes || []).filter(n => n.id !== id);
            }

            // 找到当前所在分类的笔记集合，判断是否为空
            let currentList = null;
            if (currentCategoryId) {
                const cat = globalData.note_categories.find(c => c.id === currentCategoryId);
                if (cat) currentList = cat.notes;
            } else {
                currentList = globalData.notes;
            }

            // 如果删光了，自动补一个（在当前分类或平铺）
            if (!currentList || currentList.length === 0) {
                createNewNote();
            } else {
                // 如果删的是当前正在看的，就切换到第一条
                if (id === currentNoteId) {
                    switchNote(currentList[0].id);
                }
                saveData();
                renderNoteList();
            }
        }
    }

    // 显示权限警告
    function showPermissionWarning() {
        const warning = document.getElementById('permissionWarning');
        warning.style.display = 'block';
        setTimeout(() => {
            warning.style.display = 'none';
        }, 3000);
    }

    // 监听输入，自动保存
    const titleInput = document.getElementById('noteTitleInput');
    const contentInput = document.getElementById('noteContentInput');

    function handleNoteInput() {
        if (userRole !== 'admin') {
            return; // 普通用户不能编辑
        }

        // 在分类与平铺 notes 中查找当前笔记
        let note = null;
        for (const cat of (globalData.note_categories || [])) {
            const found = (cat.notes || []).find(n => n.id === currentNoteId);
            if (found) { note = found; break; }
        }
        if (!note) note = (globalData.notes || []).find(n => n.id === currentNoteId);

        if (note) {
            note.title = titleInput.value;
            note.content = contentInput.innerHTML;
            note.updated = new Date().toLocaleString();

            // 更新界面上的时间和字数
            document.getElementById('noteUpdateTime').innerText = `更新于: 刚刚`;
            updateCharCount(note.content);

            // 防抖保存到硬盘
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => {
                saveData();
                renderNoteList(); // 刷新列表里的标题和时间
            }, 500);
        }
    }

    function updateCharCount(text) {
        let len = 0;
        if (typeof text === 'string') {
            // 如果传入 HTML 字符串，去掉标签后计数
            const tmp = document.createElement('div'); tmp.innerHTML = text;
            len = tmp.textContent ? tmp.textContent.length : 0;
        } else {
            const el = document.getElementById('noteContentInput');
            len = el ? (el.textContent || '').length : 0;
        }
        document.getElementById('noteCharCount').innerText = `${len} 字`;
    }

    titleInput.addEventListener('input', handleNoteInput);
    contentInput.addEventListener('input', handleNoteInput);
    // 支持粘贴图片到笔记（截图或复制图片后 Ctrl+V）
    contentInput.addEventListener('paste', function(e) {
        if (userRole !== 'admin') return;
        const items = (e.clipboardData || window.clipboardData).items;
        if (!items) return;
        for (const item of items) {
            if (item.type && item.type.indexOf('image') !== -1) {
                const blob = item.getAsFile();
                const reader = new FileReader();
                reader.onload = function(ev) {
                    insertImageAtCursor(ev.target.result);
                    handleNoteInput();
                };
                reader.readAsDataURL(blob);
                e.preventDefault();
                return;
            }
        }
    });

    // 点击图片放大（事件委托）
    contentInput.addEventListener('click', function(e) {
        const t = e.target;
        if (t && t.tagName === 'IMG') {
            showImagePreview(t.src);
        }
    });

    function insertImageAtCursor(dataUrl) {
        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = 'pasted-image';
        img.style.maxWidth = '100%';

        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) {
            document.getElementById('noteContentInput').appendChild(img);
            return;
        }
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(img);
        // 将光标移动到图片之后
        range.setStartAfter(img);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function showImagePreview(src) {
        const overlay = document.getElementById('imagePreview');
        const img = document.getElementById('imagePreviewImg');
        img.src = src;
        overlay.style.display = 'flex';
    }

    function hideImagePreview() {
        const overlay = document.getElementById('imagePreview');
        overlay.style.display = 'none';
        document.getElementById('imagePreviewImg').src = '';
    }

    // --- 4. 导航栏逻辑 (保持不变) ---
    function renderAllNav() {
        renderGrid('webGrid', globalData.websites);
        renderGrid('appGrid', globalData.software);
    }
    
    function renderGrid(id, list) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        list.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.draggable = userRole === 'admin'; // 只有管理员可以拖拽
            div.innerHTML = `<div class="nav-icon">${item.icon}</div><div class="nav-title">${item.title}</div>`;
            div.onclick = (e) => {
                handleOpen(item.url);
            };
            
            // 只有管理员才能看到删除按钮
            if (userRole === 'admin') {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '✕';
                // 删除按钮通过 CSS 在 hover 时显示，保持默认样式以避免全局可见
                deleteBtn.onclick = (ev) => {
                    ev.stopPropagation(); // 防止触发打开链接
                    if (confirm('删除?')) { 
                        list.splice(idx, 1); 
                        saveData(); 
                        renderAllNav(); 
                    }
                };
                div.insertBefore(deleteBtn, div.firstChild);
                
                // 简单拖拽
                div.addEventListener('dragstart', (e) => { 
                    div.classList.add('dragging'); 
                    window.dragItem = item; 
                    window.dragList = list; 
                    window.dragIndex = idx;
                    try { e.dataTransfer.setData('text/plain', 'drag'); } catch (err) {}
                });
                div.addEventListener('dragend', () => { 
                    div.classList.remove('dragging'); 
                    // 清理临时全局变量
                    delete window.dragItem; delete window.dragList; delete window.dragIndex;
                    saveData(); 
                });
            }
            
            el.appendChild(div);
        });
        
        // 拖拽放入逻辑
        if (userRole === 'admin') {
            el.addEventListener('dragover', e => { e.preventDefault(); });
            // 根据鼠标位置找到要插入之前的元素
            function getDragAfterElement(container, x, y) {
                const draggableElements = [...container.querySelectorAll('.nav-item:not(.dragging)')];
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = Math.hypot(x - (box.left + box.width/2), y - (box.top + box.height/2));
                    if (closest === null || offset < closest.offset) {
                        return { offset, element: child };
                    } else return closest;
                }, null);
            }

            el.addEventListener('drop', (e) => {
                e.preventDefault();
                const targetList = list;
                const dragItem = window.dragItem;
                const sourceList = window.dragList;
                const sourceIndex = window.dragIndex;

                if (!dragItem) return;

                // 移除原始位置（注意若源与目标相同，则先移除再插入避免重复）
                if (sourceList) {
                    const si = sourceList.indexOf(dragItem);
                    if (si !== -1) sourceList.splice(si, 1);
                }

                // 找到最接近的目标元素，并在其前插入；否则追加到末尾
                const after = getDragAfterElement(el, e.clientX, e.clientY);
                if (after && after.element) {
                    const children = Array.from(el.querySelectorAll('.nav-item'));
                    const insertIndex = children.indexOf(after.element);
                    targetList.splice(insertIndex, 0, dragItem);
                } else {
                    targetList.push(dragItem);
                }

                saveData();
                renderAllNav();
            });
        }
    }

    // --- 5. 通用网络保存 ---
    async function saveData() {
        if (userRole !== 'admin') {
            return; // 普通用户不能保存
        }
        
        await fetch('/api/save_data', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(globalData)
        });
    }

    async function handleOpen(path) {
        if (path.startsWith('http')) {
            window.open(path, '_blank');
        } else {
            // 只有管理员才能打开本地应用
            if (userRole === 'admin') {
                fetch('/api/open_app', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({path}) 
                });
            } else {
                showPermissionWarning();
            }
        }
    }

    // --- 弹窗逻辑 ---
    let addTypeTarget = null;
    function openModal(type) { 
        if (userRole !== 'admin') {
            showPermissionWarning();
            return;
        }
        
        document.getElementById('addModal').style.display = 'flex'; 
        addTypeTarget = type;
        document.getElementById('linkTitle').value='';
        document.getElementById('linkUrl').value='';
        document.getElementById('linkIcon').value='';
    }
    window.closeModal = () => document.getElementById('addModal').style.display='none';
    window.confirmAdd = () => {
        if (userRole !== 'admin') {
            showPermissionWarning();
            return;
        }
        
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        const icon = document.getElementById('linkIcon').value || '🔗';
        if(title && url) {
            const list = addTypeTarget === 'websites' ? globalData.websites : globalData.software;
            list.push({title, url, icon});
            saveData(); renderAllNav(); closeModal();
        }
    }

    // 切换笔记本放大/还原并保存到 localStorage
    function toggleNotebookSize() {
        document.body.classList.toggle('notebook-expanded');
        const expanded = document.body.classList.contains('notebook-expanded');
        try { localStorage.setItem('notebookExpanded', expanded ? '1' : '0'); } catch (e) {}
        const btn = document.getElementById('toggleNotebookBtn');
        if (btn) btn.innerText = expanded ? '🗗' : '🔍';
    }

    // 页面加载时恢复放大状态
    (function restoreNotebookSize() {
        try {
            const v = localStorage.getItem('notebookExpanded');
            if (v === '1') {
                document.body.classList.add('notebook-expanded');
            }
            // 更新按钮文本状态
            const btn = document.getElementById('toggleNotebookBtn');
            if (btn) {
                const expanded = document.body.classList.contains('notebook-expanded');
                btn.innerText = expanded ? '🗗' : '🔍';
            }
        } catch (e) {}
    })();

    // 初始化笔记本分隔条拖动调整宽度
    function initNotebookSplitter() {
        const splitter = document.getElementById('notebookSplitter');
        const sidebar = document.querySelector('.note-sidebar');
        const container = document.querySelector('.notebook-container');
        if (!splitter || !sidebar || !container) return;

        let isDragging = false;
        const minW = 140;
        const maxW = Math.max(400, Math.floor(container.clientWidth * 0.8));

        function startDrag(e) {
            isDragging = true;
            document.body.style.userSelect = 'none';
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
            try { localStorage.setItem('noteSidebarWidth', parseInt(sidebar.style.width || sidebar.offsetWidth)); } catch (e) {}
        }

        function onMove(clientX) {
            const rect = container.getBoundingClientRect();
            let newWidth = clientX - rect.left;
            newWidth = Math.max(minW, Math.min(maxW, newWidth));
            sidebar.style.width = newWidth + 'px';
        }

        splitter.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', (e) => { if (!isDragging) return; onMove(e.clientX); });
        document.addEventListener('mouseup', stopDrag);

        // touch 支持
        splitter.addEventListener('touchstart', (e) => { startDrag(e.touches[0]); });
        document.addEventListener('touchmove', (e) => { if (!isDragging) return; onMove(e.touches[0].clientX); });
        document.addEventListener('touchend', stopDrag);

        // 恢复已保存宽度
        try {
            const w = localStorage.getItem('noteSidebarWidth');
            if (w) sidebar.style.width = (parseInt(w) || 200) + 'px';
        } catch (e) {}
    }

    window.onload = () => {
        loadData();
                  initMusicPlayer();
          initResize();
          initNotebookSplitter();
          initSearchFunctionality();
      };
  
      // 搜索功能初始化
      function initSearchFunctionality() {
          const searchInput = document.getElementById('googleSearchInput');
          const searchBtn = document.getElementById('searchBtn');
          const searchSuggestions = document.getElementById('searchSuggestions');
          
          if (!searchInput || !searchBtn) return;
          
          // 搜索历史存储和管理
          let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
          
          // 格式化时间显示
          function formatTime(timestamp) {
              if (!timestamp) return '';
              const date = new Date(timestamp);
              const now = new Date();
              const diffMs = now - date;
              const diffMins = Math.floor(diffMs / 60000);
              const diffHours = Math.floor(diffMs / 3600000);
              const diffDays = Math.floor(diffMs / 86400000);
              
              if (diffMins < 1) return '刚刚';
              if (diffMins < 60) return `${diffMins}分钟前`;
              if (diffHours < 24) return `${diffHours}小时前`;
              if (diffDays < 7) return `${diffDays}天前`;
              
              return date.toLocaleDateString('zh-CN');
          }
          
          // 渲染搜索历史
          function renderSearchHistory() {
              if (searchHistory.length === 0) {
                  searchSuggestions.innerHTML = '<div class="search-empty-state">还没有搜索历史呢 🚀</div>';
                  return;
              }
              
              let html = '<div class="search-history-header">' +
                  '<span>搜索历史</span>' +
                  '<span class="search-history-clear" title="清除所有历史">清空</span>' +
                  '</div>';
              
              searchHistory.forEach((item, index) => {
                  const timestamp = typeof item === 'string' ? null : item.timestamp;
                  const text = typeof item === 'string' ? item : item.text;
                  const timeStr = formatTime(timestamp);
                  
                  html += `<div class="search-suggestion-item" data-index="${index}" onclick="event.stopPropagation();">
                      <span class="suggestion-text item-search" style="flex:1; cursor:pointer;">${escapeHtml(text)}</span>
                      <span class="suggestion-hint">${timeStr}</span>
                      <span class="suggestion-delete" title="删除">✕</span>
                  </div>`;
              });
              
              searchSuggestions.innerHTML = html;
              
              // 为渲染的元素绑定事件
              attachHistoryEventListeners();
          }
          
          // 为搜索历史元素绑定事件
          function attachHistoryEventListeners() {
              const items = searchSuggestions.querySelectorAll('.search-suggestion-item');
              
              items.forEach((item, itemIndex) => {
                  // 点击搜索文本 - 执行搜索
                  const searchText = item.querySelector('.item-search');
                  if (searchText) {
                      searchText.addEventListener('click', (e) => {
                          e.stopPropagation();
                          const index = parseInt(item.getAttribute('data-index'));
                          if (index >= 0 && index < searchHistory.length) {
                              const searchItem = searchHistory[index];
                              const text = typeof searchItem === 'string' ? searchItem : searchItem.text;
                              searchInput.value = text;
                              performGoogleSearch(text);
                          }
                      });
                  }
                  
                  // 删除按钮点击
                  const deleteBtn = item.querySelector('.suggestion-delete');
                  if (deleteBtn) {
                      deleteBtn.addEventListener('click', (e) => {
                          e.stopPropagation();
                          e.preventDefault();
                          const index = parseInt(item.getAttribute('data-index'));
                          if (!isNaN(index) && index >= 0 && index < searchHistory.length) {
                              if (confirm('确定要删除这条搜索历史吗？')) {
                                  searchHistory.splice(index, 1);
                                  localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                                  renderSearchHistory();
                              }
                          }
                      });
                  }
              });
              
              // 清空按钮事件
              const clearBtn = searchSuggestions.querySelector('.search-history-clear');
              if (clearBtn) {
                  clearBtn.addEventListener('click', (e) => {
                      e.stopPropagation();
                      e.preventDefault();
                      if (confirm('确定要清除所有搜索历史吗？')) {
                          searchHistory = [];
                          localStorage.setItem('searchHistory', '[]');
                          renderSearchHistory();
                      }
                  });
              }
          }
          
          // 转义HTML特殊字符
          function escapeHtml(text) {
              const map = {
                  '&': '&amp;',
                  '<': '&lt;',
                  '>': '&gt;',
                  '"': '&quot;',
                  "'": '&#039;'
              };
              return text.replace(/[&<>"']/g, m => map[m]);
          }
          
          // 添加到搜索历史（带时间戳）
          function addToSearchHistory(query) {
              if (!query || query.trim() === '') return;
              
              const trimmedQuery = query.trim();
              // 移除重复项（比较搜索文本）
              searchHistory = searchHistory.filter(item => {
                  const text = typeof item === 'string' ? item : item.text;
                  return text !== trimmedQuery;
              });
              
              // 添加新项到开头（带时间戳）
              searchHistory.unshift({
                  text: trimmedQuery,
                  timestamp: new Date().getTime()
              });
              
              // 只保留最近30条
              if (searchHistory.length > 30) {
                  searchHistory = searchHistory.slice(0, 30);
              }
              
              localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
          }
          
          // 执行Google搜索或跳转网址
          function performGoogleSearch(query) {
              if (!query || query.trim() === '') return;
              
              const trimmedQuery = query.trim();
              
              // 判断是否为网址
              function isWebsite(input) {
                  // 检查是否包含协议头
                  if (input.startsWith('http://') || input.startsWith('https://')) {
                      return true;
                  }
                  // 检查是否包含域名扩展名
                  const domainPattern = /\.(com|cn|org|net|io|co|dev|app|info|shop|top|xyz|site|online|tech|web|tv|cc|us|uk|au|jp|de|fr|it|es|ru|kr|in|mx|br|ca|edu|gov|mil)+$/i;
                  if (domainPattern.test(input)) {
                      return true;
                  }
                  // 检查是否包含冒号（可能是本地地址如localhost:3000）
                  if (input.includes(':') && !input.includes(' ')) {
                      return true;
                  }
                  return false;
              }
              
              let targetUrl;
              
              if (isWebsite(trimmedQuery)) {
                  // 是网址：直接跳转
                  // 如果没有协议头，添加https://
                  if (!trimmedQuery.startsWith('http://') && !trimmedQuery.startsWith('https://')) {
                      targetUrl = `https://${trimmedQuery}`;
                  } else {
                      targetUrl = trimmedQuery;
                  }
              } else {
                  // 是搜索词：使用Google搜索
                  const encodedQuery = encodeURIComponent(trimmedQuery);
                  targetUrl = `https://www.google.com/search?q=${encodedQuery}`;
              }
              
              // 添加到搜索历史
              addToSearchHistory(trimmedQuery);
              
              // 跳转到目标URL
              window.open(targetUrl, '_blank');
              
              // 清空输入框
              searchInput.value = '';
              // 隐藏建议框
              searchSuggestions.style.display = 'none';
          }
          
          // 搜索按钮点击事件
          searchBtn.addEventListener('click', () => {
              performGoogleSearch(searchInput.value);
          });
          
          // 输入框回车事件
          searchInput.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                  performGoogleSearch(searchInput.value);
              }
          });
          
          // 输入框聚焦事件 - 显示历史
          searchInput.addEventListener('focus', () => {
              if (searchInput.value.trim() === '') {
                  renderSearchHistory();
                  searchSuggestions.style.display = 'block';
              }
          });
          
          // 输入框输入事件
          searchInput.addEventListener('input', () => {
              const query = searchInput.value.trim();
              if (query === '') {
                  renderSearchHistory();
                  searchSuggestions.style.display = 'block';
              } else {
                  searchSuggestions.style.display = 'none';
              }
          });
          
          // 点击页面其他地方隐藏建议框
          document.addEventListener('click', (e) => {
              if (!searchInput.contains(e.target) && !searchSuggestions.contains(e.target)) {
                  searchSuggestions.style.display = 'none';
              }
          });
          
          // 输入框获得焦点时的视觉效果
          searchInput.addEventListener('focus', () => {
              searchInput.style.borderColor = 'var(--accent-cyan)';
              searchInput.style.boxShadow = '0 0 0 3px rgba(0, 230, 255, 0.25), var(--glow-intensity)';
          });
          
          searchInput.addEventListener('blur', () => {
              searchInput.style.borderColor = 'var(--card-border)';
              searchInput.style.boxShadow = 'var(--shadow-light)';
          });
          
          // 添加一些科技感特效
          let pulseInterval;
          searchInput.addEventListener('focus', () => {
              clearInterval(pulseInterval);
              pulseInterval = setInterval(() => {
                  searchBtn.style.transform = `translateY(-50%) scale(${1 + Math.random() * 0.1})`;
              }, 300);
          });
          
          searchInput.addEventListener('blur', () => {
              clearInterval(pulseInterval);
              searchBtn.style.transform = 'translateY(-50%)';
          });
          
          console.log('搜索功能初始化完成 - 科技感搜索框已就绪');
      }
  </script>
